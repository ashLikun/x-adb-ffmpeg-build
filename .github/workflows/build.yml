name: Build Minimal FFmpeg

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm
            make
            git

      - name: Download FFmpeg Source
        shell: msys2 {0}
        run: |
          git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        shell: msys2 {0}
        run: |
          cd ffmpeg-src
          export PATH="/mingw64/bin:$PATH"
          export CC=gcc
          export CXX=g++
          export AR=ar
          export NM=nm
          export RANLIB=ranlib
          export STRIP=strip

          # 方案：完全禁用线程，彻底避免 pthreads/w32threads 依赖
          # 硬件加速（D3D11VA/DXVA2）在 GPU 执行，不受影响
          # 软件解码变慢但用户主要用硬解
          # 启用 swscale 用于 YUV → RGB 转换
          ./configure \
            --enable-shared \
            --disable-static \
            --disable-doc \
            --disable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-network \
            --disable-everything \
            --disable-autodetect \
            --disable-pthreads \
            --disable-w32threads \
            --disable-os2threads \
            --enable-decoder=h264,aac,opus \
            --enable-parser=h264,aac,opus \
            --enable-demuxer=h264 \
            --enable-hwaccel=h264_d3d11va \
            --enable-hwaccel=h264_dxva2 \
            --enable-protocol=file \
            --enable-swresample \
            --enable-swscale \
            --arch=x86_64 \
            --target-os=mingw64 \
            --extra-cflags="-O2 -s -DNDEBUG" \
            --extra-ldflags="-Wl,--gc-sections -s" \
            --extra-libs="-lws2_32 -lole32 -luser32 -lbcrypt"

      - name: Build FFmpeg
        shell: msys2 {0}
        run: |
          cd ffmpeg-src
          make -j$(nproc)

      - name: Collect Files
        shell: msys2 {0}
        run: |
          mkdir -p output/bin output/lib output/include

          # 只复制带版本号的 DLL（避免重复）
          cp ffmpeg-src/libavcodec/avcodec-*.dll output/bin/ 2>/dev/null || true
          cp ffmpeg-src/libavutil/avutil-*.dll output/bin/ 2>/dev/null || true
          cp ffmpeg-src/libswresample/swresample-*.dll output/bin/ 2>/dev/null || true
          cp ffmpeg-src/libswscale/swscale-*.dll output/bin/ 2>/dev/null || true

          # 复制 MinGW 运行时 DLL（必需依赖）
          cp /mingw64/bin/libwinpthread-1.dll output/bin/ 2>/dev/null || true
          cp /mingw64/bin/libgcc_s_seh-1.dll output/bin/ 2>/dev/null || true
          cp /mingw64/bin/libstdc++-6.dll output/bin/ 2>/dev/null || true

          # lib 文件
          cp ffmpeg-src/libavcodec/avcodec.lib output/lib/ 2>/dev/null || true
          cp ffmpeg-src/libavutil/avutil.lib output/lib/ 2>/dev/null || true
          cp ffmpeg-src/libswresample/swresample.lib output/lib/ 2>/dev/null || true
          cp ffmpeg-src/libswscale/swscale.lib output/lib/ 2>/dev/null || true

          # 只复制 .h 头文件（不复制 .c/.o/.d/Makefile 等编译中间文件）
          mkdir -p output/include/libavcodec output/include/libavutil output/include/libswresample output/include/libswscale
          find ffmpeg-src/libavcodec -name "*.h" -exec cp {} output/include/libavcodec/ \;
          find ffmpeg-src/libavutil -name "*.h" -exec cp {} output/include/libavutil/ \;
          find ffmpeg-src/libswresample -name "*.h" -exec cp {} output/include/libswresample/ \;
          find ffmpeg-src/libswscale -name "*.h" -exec cp {} output/include/libswscale/ \;

          echo "=== 编译结果 ==="
          echo "DLL 文件:"
          ls -lh output/bin/*.dll 2>/dev/null || echo "未找到 DLL"
          echo ""
          echo "DLL 总大小:"
          du -ch output/bin/*.dll 2>/dev/null | tail -1 || echo "无法计算"
          echo ""
          echo "头文件数量:"
          find output/include -name "*.h" | wc -l

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-minimal-windows-x64
          path: |
            output/bin/
            output/lib/
            output/include/
          retention-days: 30
