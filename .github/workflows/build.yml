name: Build Minimal FFmpeg

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm
            make
            git

      - name: Download FFmpeg Source
        shell: msys2 {0}
        run: |
          git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        shell: msys2 {0}
        run: |
          cd ffmpeg-src
          export PATH="/mingw64/bin:$PATH"
          export CC=gcc
          export CXX=g++
          export AR=ar
          export NM=nm
          export RANLIB=ranlib
          export STRIP=strip

          ./configure \
            --enable-shared \
            --disable-static \
            --disable-doc \
            --disable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-network \
            --disable-everything \
            --disable-autodetect \
            --enable-decoder=h264 \
            --enable-parser=h264 \
            --enable-demuxer=h264 \
            --enable-hwaccel=h264_d3d11va \
            --enable-hwaccel=h264_dxva2 \
            --enable-protocol=file \
            --enable-filter=scale \
            --enable-swscale \
            --arch=x86_64 \
            --target-os=mingw64 \
            --extra-cflags="-O2 -s -DNDEBUG" \
            --extra-ldflags="-Wl,--gc-sections -s"

      - name: Build FFmpeg
        shell: msys2 {0}
        run: |
          cd ffmpeg-src
          make -j$(nproc)

      - name: Collect Files
        shell: msys2 {0}
        run: |
          mkdir -p output/dll output/lib output/include

          # DLL 文件
          cp ffmpeg-src/libavcodec/*.dll output/dll/ 2>/dev/null || true
          cp ffmpeg-src/libavutil/*.dll output/dll/ 2>/dev/null || true
          cp ffmpeg-src/libswscale/*.dll output/dll/ 2>/dev/null || true

          # lib 文件
          cp ffmpeg-src/libavcodec/*.lib output/lib/ 2>/dev/null || true
          cp ffmpeg-src/libavutil/*.lib output/lib/ 2>/dev/null || true
          cp ffmpeg-src/libswscale/*.lib output/lib/ 2>/dev/null || true

          # 头文件
          cp -r ffmpeg-src/libavcodec output/include/ 2>/dev/null || true
          cp -r ffmpeg-src/libavutil output/include/ 2>/dev/null || true
          cp -r ffmpeg-src/libswscale output/include/ 2>/dev/null || true

          echo "=== 编译结果 ==="
          echo "DLL 文件:"
          ls -lh output/dll/
          echo ""
          echo "DLL 总大小:"
          du -sh output/dll/*.dll | awk '{sum+=$1} END {print sum " KB"}'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-minimal-windows-x64
          path: output/
          retention-days: 30
